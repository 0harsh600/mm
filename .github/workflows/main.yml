name: Automated Open Redirect Scanner
on: workflow_dispatch: schedule: - cron: '0 0 * * *'
jobs: scan: runs-on: ubuntu-latest
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
  - name: Setup Go
    uses: actions/setup-go@v5
    with:
      go-version: '1.21'
      
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
  - name: Install Bug Bounty Tools
    run: |
      go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      go install github.com/projectdiscovery/httpx/cmd/httpx@latest
      go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
      
      echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      git clone https://github.com/devanshbatham/ParamSpider
      cd ParamSpider
      pip install .
      cd ..
  - name: Verify targets.txt exists
    run: |
      if [ ! -f "targets.txt" ]; then
        echo "Error: targets.txt file is missing in the repository!"
        exit 1
      fi
  - name: Enumerate Subdomains
    run: |
      subfinder -dL targets.txt -all -silent > subdomains.txt
  - name: Check for Live Hosts
    run: |
      cat subdomains.txt | httpx -silent -ports 80,443,8080 > live_hosts.txt
  - name: Fetch Parameterized URLs
    run: |
      paramspider -l live_hosts.txt
      
      if [ -d "results" ]; then
        cat results/*.txt > all_params.txt 2>/dev/null || touch all_params.txt
      else
        touch all_params.txt
      fi
  - name: Scan for Open Redirects
    run: |
      if [ -s all_params.txt ]; then
        nuclei -l all_params.txt -tags redirect -o final_findings.txt
      else
        touch final_findings.txt
      fi
  - name: Output Results
    run: |
      cat final_findings.txt
  - name: Upload Results Artifact
    uses: actions/upload-artifact@v4
    with:
      name: open-redirect-vulnerabilities
      path: final_findings.txt
